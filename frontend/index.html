<!DOCTYPE html>
<html>
<head>
  <title>Login - Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p>Don’t have an account? <span class="link" onclick="goRegister()">Register</span></p>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const API = "http://localhost:8080";

    function showToast(msg){
      const t = document.getElementById("toast");
      t.innerText = msg;
      t.style.display = "block";
      setTimeout(()=>t.style.display="none",3000);
    }

    async function login(){
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      if(!email || !password) return showToast("Enter all fields");

      try {
        const res = await fetch(`${API}/login`,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({email,password})
        });

        if(res.ok){
          const data = await res.json();
          localStorage.setItem("token", data.token);
          showToast("Login successful!");
          setTimeout(()=>window.location="dashboard.html",1000);
        } else {
          const err = await res.json();
          showToast(err.message || "Login failed");
        }
      } catch(e){
        showToast("Login failed");
        console.error(e);
      }
    }

    function goRegister(){ window.location="register.html"; }
  </script>
</body>
</html>
